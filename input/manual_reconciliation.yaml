# Russia csv_row 3: unsupported Liaison (1917) — keeping. Relations were never
# formally severed but the U.S. refused all contact with the Bolshevik government.
# "Liaison" captures this ambiguous state (consistent with Laos 1975 treatment).
- country: "Russia"
  csv_row: 3
  decision: keep
  notes: "Normal diplomatic relations were interrupted following the November 7, 1917, Bolshevik Revolution in Russia. After the abdication of Tsar Nicholas II during the February Revolution earlier that year, Ambassador to Russia, David R. Francis, had informed the new Provisional Government that the United States recognized the new government and would maintain diplomatic relations with Russia. On December 6, 1917, following the Bolshevik October Revolution that overthrew the Provisional Government, President Woodrow Wilson instructed all American diplomatic representatives in Russia to refrain from any direct communication with representatives of the Bolshevik Government. Although diplomatic relations with Russia never were formally severed, the United States refused to recognize or have any formal relations with the Bolshevik/Soviet governments until 1933."

