project:
  type: website
  output-dir: _site

website:
  title: "US Diplomatic Mission Status Data"
  navbar:
    background: "#0f1729"
    foreground: "#f0ece4"
    left:
      - text: Home
        href: index.qmd
      - text: Download
        href: download.qmd
      - text: Codebook
        href: codebook.qmd
      - text: Explorer
        href: explorer/index.qmd
  page-footer:
    center: |
      Data compiled from the [Office of the Historian](https://history.state.gov/),
      U.S. Department of State.

format:
  html:
    theme:
      light:
        - cosmo
        - styles.scss
    mainfont: "Source Serif 4, Georgia, serif"
    monofont: "JetBrains Mono, monospace"
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
